spring:
  application:
    name: opera-cloud-persistence
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    url: ${ORACLE_URL:jdbc:oracle:thin:@10.134.0.69:1521/XEPDB1}
    username: ${ORACLE_USER:system}
    password: ${ORACLE_PASSWORD:oracle}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: opera-persistence-pool
  jpa:
    database-platform: org.hibernate.dialect.OracleDialect
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
        default_schema: ${ORACLE_SCHEMA:OPERA}
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
    default-schema: ${ORACLE_SCHEMA:OPERA}
    liquibase-schema: ${ORACLE_SCHEMA:OPERA}
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    consumer:
      group-id: opera-cloud-persistence
      auto-offset-reset: earliest
      enable-auto-commit: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers,prometheus
  endpoint:
    health:
      show-details: always
      show-components: always
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true

info:
  app:
    name: opera-cloud-persistence
    version: ${APP_VERSION:1.0.0}
    description: Opera Cloud CDC persistence microservice

kafka:
  name:
    input-topic: ${NAME_INPUT_TOPIC:oc_name_dev}
  membership:
    input-topic: ${MEMBERSHIP_INPUT_TOPIC:oc_membership_dev}
  name-address:
    input-topic: ${NAME_ADDRESS_INPUT_TOPIC:oc_name_address_dev}
  name-phone:
    input-topic: ${NAME_PHONE_INPUT_TOPIC:oc_name_phone_dev}
  reservation-name:
    input-topic: ${RESV_NAME_INPUT_TOPIC:oc_reservation_name_dev}
  reservation-daily-elements:
    input-topic: ${RESV_DAILY_EL_INPUT_TOPIC:oc_reservation_daily_elements_dev}
  reservation-daily-element-name:
    input-topic: ${RESV_DAILY_EL_NAME_INPUT_TOPIC:oc_reservation_daily_element_name_dev}
  reservation-special-requests:
    input-topic: ${RESV_SPECIAL_REQUESTS_INPUT_TOPIC:oc_reservation_special_requests_dev}
  financial:
    input-topic: ${FINANCIAL_INPUT_TOPIC:oc_financial_transactions_dev}
  ar-account:
    input-topic: ${AR_ACCOUNT_INPUT_TOPIC:oc_ar_account_dev}
  folio-tax:
    input-topic: ${FOLIO_TAX_INPUT_TOPIC:oc_folio_tax_dev}
  trx-codes:
    input-topic: ${TRX_CODES_INPUT_TOPIC:oc_trx_codes_dev}
  rate-header:
    input-topic: ${RATE_HEADER_INPUT_TOPIC:oc_rate_header_dev}

logging:
  kafka:
    topic: ${LOG_KAFKA_TOPIC:app-logs}

server:
  port: 7668
  shutdown: graceful
